<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timematter - Aging Society Platform</title>
    <link rel="icon" type="image/x-icon" href="/public/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/public/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/public/favicon/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/public/favicon/apple-icon-180x180.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2d1912;
        border-radius: 10px;
      }

      /* ── Brand colour overrides: emerald/teal → #2d1912 ── */

      /* text */
      .text-emerald-400,.text-emerald-500,.text-emerald-600,.text-emerald-700,
      .text-emerald-800,.text-emerald-900,
      .text-teal-600,.text-teal-700 { color: #2d1912 !important; }

      /* light text kept white-ish (used on dark/gradient backgrounds) */
      .text-emerald-100 { color: #f5ede8 !important; }
      .text-emerald-200 { color: #ecddd7 !important; }
      .text-emerald-300 { color: #d9c0b5 !important; }

      /* group-hover text */
      .group:hover .group-hover\:text-emerald-400,
      .group:hover .group-hover\:text-emerald-600 { color: #2d1912 !important; }
      .hover\:text-emerald-500:hover,
      .hover\:text-emerald-600:hover,
      .hover\:text-emerald-700:hover { color: #4a2b1a !important; }

      /* backgrounds */
      .bg-emerald-500,.bg-emerald-600,.bg-teal-600,.bg-teal-700 { background-color: #2d1912 !important; }
      .bg-emerald-700 { background-color: #4a2b1a !important; }
      .bg-emerald-50  { background-color: #f5ede8 !important; }
      .bg-emerald-100 { background-color: #ecddd7 !important; }

      /* hover backgrounds */
      .hover\:bg-emerald-50:hover   { background-color: #f5ede8 !important; }
      .hover\:bg-emerald-100:hover  { background-color: #ecddd7 !important; }
      .hover\:bg-emerald-600:hover  { background-color: #2d1912 !important; }
      .hover\:bg-emerald-700:hover  { background-color: #4a2b1a !important; }
      .hover\:bg-teal-700:hover     { background-color: #4a2b1a !important; }

      /* borders */
      .border-emerald-500 { border-color: #2d1912 !important; }
      .border-emerald-200 { border-color: #ecddd7 !important; }
      .focus\:ring-emerald-500:focus { --tw-ring-color: #2d1912 !important; }
      .focus\:border-emerald-500:focus { border-color: #2d1912 !important; }

      /* gradients (from-emerald / to-teal) */
      .from-emerald-600 { --tw-gradient-from: #2d1912 !important; }
      .to-teal-700      { --tw-gradient-to:   #4a2b1a !important; }
      .from-emerald-500 { --tw-gradient-from: #2d1912 !important; }
      .to-emerald-600   { --tw-gradient-to:   #4a2b1a !important; }

      /* shadows */
      .shadow-emerald-200\/50 { --tw-shadow-color: rgba(45,25,18,0.15) !important; }

      /* divide */
      .divide-emerald-100 > * + * { border-color: #ecddd7 !important; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
